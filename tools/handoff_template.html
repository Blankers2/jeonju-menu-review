<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>메뉴 검수 (동료용)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" />
<style>
:root{--bg:#f4f6f9;--surface:#fff;--surface-2:#fbfcfe;--border:#e8eaf0;--border-strong:#d6dae3;
--text:#181c22;--muted:#79828f;--faint:#a3abb6;--accent:#3b5bdb;--accent-ink:#2c44ad;--accent-weak:#eef2fe;
--good:#15a34a;--danger:#e0413b;--shadow-sm:0 1px 2px rgba(18,24,40,.05),0 1px 3px rgba(18,24,40,.05);
--radius:13px;--mono:"JetBrains Mono",ui-monospace,monospace;--sans:"Pretendard Variable",Pretendard,system-ui,"Apple SD Gothic Neo",sans-serif;}
*{box-sizing:border-box;}html,body{height:100%;}
body{margin:0;font-family:var(--sans);color:var(--text);background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:13px;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;}
header{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:11px 20px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
.brand{font-weight:800;font-size:15px;letter-spacing:-.03em;}
.brand .mark{display:inline-block;width:18px;height:18px;border-radius:6px;background:linear-gradient(135deg,#6d86f5,#3b5bdb 60%,#2c44ad);vertical-align:-3px;margin-right:7px;}
#progress{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 12px;}
#search{flex:1;max-width:340px;padding:7px 12px;border:1px solid var(--border-strong);border-radius:9px;font-family:var(--sans);}
.sp{margin-left:auto;}
.btn{font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer;border-radius:9px;padding:8px 13px;border:1px solid transparent;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,91,219,.28);}
.btn-primary:hover{background:var(--accent-ink);}
.btn-outline{background:var(--surface);border-color:var(--border-strong);color:var(--text);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent-ink);}
main{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:250px 1fr 720px;gap:12px;padding:12px 16px 16px;overflow:hidden;}
#sidebar,#viewer,#editor{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);min-height:0;}
#sidebar{overflow:auto;padding:6px;}
.pg{font-weight:700;font-size:11px;color:var(--muted);padding:11px 10px 5px;position:sticky;top:0;background:var(--surface);}
.pg .pid{font-family:var(--mono);color:var(--faint);}
.it{padding:8px 10px 8px 13px;margin:1px 2px;border-radius:8px;cursor:pointer;font-size:13px;color:#2c333d;}
.it:hover{background:var(--surface-2);}
.it.active{background:var(--accent-weak);color:var(--accent-ink);font-weight:600;box-shadow:inset 3px 0 0 var(--accent);}
.it.done{color:var(--good);}
.it .mono{font-family:var(--mono);font-size:12px;}.it .bd{color:var(--faint);font-size:11.5px;margin-left:4px;}
#viewer{display:flex;flex-direction:column;overflow:hidden;}
.tb{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);}
.tb .ib{width:30px;height:30px;border:1px solid var(--border);background:var(--surface);border-radius:8px;font-size:16px;color:var(--muted);cursor:pointer;}
.tb .ib:hover{border-color:var(--accent);color:var(--accent);}
.tb a{margin-left:auto;font-size:12px;color:var(--accent);text-decoration:none;font-weight:600;}
#imgwrap{flex:1 1 auto;overflow:auto;min-height:0;background:repeating-conic-gradient(#f1f3f7 0% 25%,#f7f9fc 0% 50%) 0/22px 22px;padding:12px;}
#img{display:block;border-radius:6px;box-shadow:0 4px 20px rgba(18,24,40,.14);background:#fff;}
#editor{display:flex;flex-direction:column;overflow:hidden;padding:14px;}
.hd{flex:0 0 auto;display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.hd .meta{font-family:var(--mono);font-size:12px;color:var(--muted);}
.trtog{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface-2);}
.trtog:has(input:checked){color:var(--danger);border-color:var(--danger);background:#fdf2f2;}
.tw{flex:1 1 auto;overflow:auto;min-height:0;border:1px solid var(--border);border-radius:10px;}
table{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;}
thead th{position:sticky;top:0;z-index:3;background:var(--surface-2);font-size:11px;font-weight:700;color:var(--muted);text-align:left;padding:9px 8px;border-bottom:1px solid var(--border-strong);}
tbody td{border-bottom:1px solid var(--border);padding:0;overflow:hidden;}
tbody tr:nth-child(even) td{background:#fcfdff;}tbody tr.sel td{background:#fff7df;}
td input{width:100%;border:0;padding:9px 8px;font-size:13px;font-family:var(--sans);background:transparent;color:var(--text);}
td input:focus{outline:none;background:#fff;box-shadow:inset 0 0 0 2px var(--accent);border-radius:4px;}
td input[readonly]{color:var(--faint);cursor:default;}
#rows th:nth-child(1),#rows td.cd{width:62px;text-align:center;}
#rows th:nth-child(2),#rows td:nth-child(2){width:40%;}#rows td:nth-child(2) input{font-size:14.5px;font-weight:600;}
#rows th:nth-child(3),#rows td:nth-child(3){width:13%;}#rows td:nth-child(3) input{font-family:var(--mono);font-size:12.5px;}
#rows th:nth-child(n+4):nth-child(-n+7),#rows td:nth-child(n+4):nth-child(-n+7){width:10%;}
#rows td:nth-child(n+4):nth-child(-n+7) input{color:var(--muted);font-size:12px;}
.cd button{width:22px;height:22px;margin:0 1px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--faint);font-size:13px;}
.cd button[data-del]:hover{border-color:var(--danger);color:var(--danger);}
.cd button[data-split]:hover{border-color:var(--accent);color:var(--accent);}
.act{flex:0 0 auto;display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}.act .btn-primary{margin-left:auto;}
.prices{flex:0 0 auto;margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
.pt{font-size:12px;font-weight:700;margin-bottom:7px;}.pt .h{font-weight:500;color:var(--faint);margin-left:6px;}
#pal{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-family:var(--mono);font-size:12px;color:#3a4250;padding:5px 11px;border:1px solid var(--border-strong);border-radius:999px;background:var(--surface);cursor:pointer;}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.savetag{font-size:11px;color:var(--good);}
</style>
</head>
<body>
<header>
  <span class="brand"><span class="mark"></span>메뉴 검수 · 동료용</span>
  <input id="search" placeholder="가게명 / item / 메뉴 검색" />
  <span id="progress">—</span>
  <button id="import" class="btn btn-outline">불러오기</button>
  <button id="export" class="btn btn-primary">내보내기(회신용)</button>
  <span id="savetag" class="savetag"></span>
</header>
<main>
  <aside id="sidebar"></aside>
  <section id="viewer">
    <div class="tb">
      <button id="zo" class="ib" title="축소">−</button>
      <button id="zf" class="btn btn-outline" style="padding:5px 10px">맞춤</button>
      <button id="zi" class="ib" title="확대">+</button>
      <a id="orig" href="#" target="_blank" rel="noopener">원본 새 탭 ↗</a>
    </div>
    <div id="imgwrap"><img id="img" alt="왼쪽에서 항목을 선택하세요" /></div>
  </section>
  <section id="editor">
    <div class="hd">
      <span id="meta" class="meta"></span>
      <label class="trtog" title="번역은 기본 잠금 — 조각 합칠 때만 켜세요"><input id="tred" type="checkbox" /> 번역 수정</label>
      <label style="margin-left:auto;font-size:12px;color:var(--muted)">가게명 <input id="title" type="text" style="padding:7px 11px;border:1px solid var(--border-strong);border-radius:9px;font-weight:600;min-width:200px"/></label>
    </div>
    <div class="tw"><table id="rows"><thead><tr>
      <th></th><th>메뉴명</th><th>가격</th><th>영어</th><th>일본어</th><th>중국어<br>간체</th><th>중국어<br>번체</th>
    </tr></thead><tbody></tbody></table></div>
    <div class="act">
      <button id="addrow" class="btn btn-outline">＋ 행 추가</button>
      <button id="done" class="btn btn-outline">검수완료 토글</button>
    </div>
    <div class="prices"><div class="pt">가격 조각 <span class="h">행 선택 후 클릭하면 가격 채움</span></div><div id="pal"></div></div>
  </section>
</main>
<input id="file" type="file" accept="application/json" hidden />
<script>
const MANIFEST = __MANIFEST__;
const BASE_ITEMS = __DATA__;
const SKEY = "menufinder_handoff_" + (MANIFEST.created||"x").replace(/[^0-9]/g,"");
const TR=new Set(["en","ja","zh_cn","zh_tw"]);
const COLS=[["menu"],["price"],["en"],["ja"],["zh_cn"],["zh_tw"]];
const $=s=>document.querySelector(s);
let items, cur=null, sel=-1, zoom=1, nW=0,nH=0;

function load(){ try{const s=localStorage.getItem(SKEY); if(s){items=JSON.parse(s); return;}}catch(e){} items=JSON.parse(JSON.stringify(BASE_ITEMS)); }
let saveT=null;
function save(){ localStorage.setItem(SKEY, JSON.stringify(items));
  const t=$("#savetag"); t.textContent="저장됨 ✓"; clearTimeout(saveT); saveT=setTimeout(()=>t.textContent="",1200); updateProgress(); }
function esc(s){return (s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function trEditable(){return $("#tred").checked;}
function locked(k){return TR.has(k)&&!trEditable();}

function updateProgress(){ const d=items.filter(i=>i.reviewed).length; $("#progress").textContent=`검수완료 ${d} / ${items.length}`; }

function renderSidebar(){
  const q=$("#search").value.trim().toLowerCase();
  const el=$("#sidebar"); el.innerHTML=""; let last=null;
  for(const im of items){
    if(q){ const hay=(im.title+" "+im.item_id+" "+im.rows.map(r=>r.menu).join(" ")).toLowerCase(); if(!hay.includes(q))continue; }
    if(im.place_id!==last){ last=im.place_id; const g=document.createElement("div"); g.className="pg"; g.innerHTML=`${esc(im.title)||"(이름없음)"} <span class="pid">#${im.place_id??"-"}</span>`; el.appendChild(g); }
    const d=document.createElement("div");
    d.className="it"+(im.reviewed?" done":"")+(cur&&cur.item_id===im.item_id?" active":"");
    d.innerHTML=`${im.reviewed?"✓ ":""}<span class="mono">${im.item_id}</span> <span class="bd">${im.rows.length}행</span>`;
    d.onclick=()=>openItem(im.item_id); el.appendChild(d);
  }
  updateProgress();
}
function openItem(id){
  cur=items.find(i=>i.item_id===id); sel=-1; zoom=1; nW=nH=0;
  $("#tred").checked=false;
  $("#title").value=cur.title||"";
  $("#meta").textContent=`place ${cur.place_id??"-"} · item ${cur.item_id} · ${cur.width??"?"}×${cur.height??"?"}`;
  $("#orig").href=cur.image_url||"#";
  const img=$("#img"); img.onload=()=>{nW=img.naturalWidth;nH=img.naturalHeight;fit();}; img.src=cur.image_url||"";
  renderRows(); renderPrices(); renderSidebar();
}
function applyZoom(){ if(nW)$("#img").style.width=Math.round(nW*zoom)+"px"; }
function fit(){ const w=$("#imgwrap"); if(!nW||!nH)return; zoom=Math.min(w.clientWidth/nW,w.clientHeight/nH)||1; applyZoom(); }
$("#zi").onclick=()=>{zoom=Math.min(zoom*1.25,8);applyZoom();};
$("#zo").onclick=()=>{zoom=Math.max(zoom/1.25,.05);applyZoom();};
$("#zf").onclick=fit; window.addEventListener("resize",()=>{if(nW)fit();});

function renderRows(){
  const tb=$("#rows tbody"); tb.innerHTML="";
  cur.rows.forEach((row,i)=>{
    const tr=document.createElement("tr"); if(i===sel)tr.classList.add("sel");
    tr.innerHTML=`<td class="cd"><button data-del="${i}" title="삭제">×</button><button data-split="${i}" title="소/중/대 분할">＋</button></td>`+
      COLS.map(([k])=>`<td><input value="${esc(row[k])}" data-i="${i}" data-k="${k}"${locked(k)?' readonly tabindex="-1" title="번역은 기본 잠금 — 상단 [번역 수정] 토글"':""}></td>`).join("");
    tb.appendChild(tr);
    tr.addEventListener("click",e=>{ if(e.target.tagName==="BUTTON")return; sel=i;
      document.querySelectorAll("#rows tbody tr").forEach((t,j)=>t.classList.toggle("sel",j===i)); });
  });
  tb.querySelectorAll("input").forEach(inp=>{
    inp.oninput=()=>{ if(locked(inp.dataset.k))return; cur.rows[inp.dataset.i][inp.dataset.k]=inp.value; save(); };
    inp.addEventListener("keydown",e=>{ if(!["ArrowDown","ArrowUp","Enter"].includes(e.key))return; e.preventDefault();
      const i=+inp.dataset.i,k=inp.dataset.k,ni=e.key==="ArrowUp"?i-1:i+1;
      const t=tb.querySelector(`input[data-i="${ni}"][data-k="${k}"]`); if(t){t.focus();t.select();} });
  });
  tb.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{cur.rows.splice(+b.dataset.del,1);if(sel>=cur.rows.length)sel=-1;renderRows();save();});
  tb.querySelectorAll("[data-split]").forEach(b=>b.onclick=()=>{const r=cur.rows[+b.dataset.split];
    cur.rows.splice(+b.dataset.split+1,0,{menu:r.menu,price:"",en:r.en,ja:r.ja,zh_cn:r.zh_cn,zh_tw:r.zh_tw});renderRows();save();});
}
function renderPrices(){
  const el=$("#pal"); el.innerHTML="";
  (cur.prices||[]).forEach(p=>{ const c=document.createElement("span"); c.className="chip"; c.textContent=p.text;
    c.onclick=()=>{ if(sel<0){alert("먼저 표에서 행을 클릭해 선택하세요.");return;} cur.rows[sel].price=p.number||p.text; renderRows(); document.querySelectorAll("#rows tbody tr")[sel]?.classList.add("sel"); save(); };
    el.appendChild(c); });
  if(!(cur.prices||[]).length) el.textContent="(가격 조각 없음)";
}
$("#tred").addEventListener("change",()=>{if(cur)renderRows();});
$("#addrow").onclick=()=>{cur.rows.push({menu:"",price:"",en:"",ja:"",zh_cn:"",zh_tw:""});renderRows();save();};
$("#done").onclick=()=>{cur.reviewed=!cur.reviewed;cur.status=cur.reviewed?"done":"pending";cur.edited=true;renderSidebar();save();};
$("#title").addEventListener("input",()=>{if(cur){cur.title=$("#title").value;save();}});
$("#search").addEventListener("input",renderSidebar);

$("#export").onclick=()=>{
  const bundle={manifest:MANIFEST, drafts:items};
  const blob=new Blob([JSON.stringify(bundle,null,1)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="메뉴검수_회신_"+(MANIFEST.created||"").replace(/[^0-9]/g,"")+".json"; a.click();
};
$("#import").onclick=()=>$("#file").click();
$("#file").addEventListener("change",e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const b=JSON.parse(r.result); const arr=b.drafts||b; const byId=Object.fromEntries(arr.map(d=>[d.item_id,d]));
    items.forEach((it,idx)=>{ if(byId[it.item_id]) items[idx]=byId[it.item_id]; }); save(); renderSidebar(); if(cur)openItem(cur.item_id); alert("불러오기 완료"); }catch(err){alert("JSON 읽기 실패: "+err.message);} };
  r.readAsText(f); });

load(); renderSidebar();
if(items.length) openItem(items[0].item_id);
</script>
</body>
</html>
