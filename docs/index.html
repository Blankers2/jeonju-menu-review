<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>메뉴 최종검수 — 전주시</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" />
<link rel="stylesheet" href="./style.css" />
</head>
<body>
<header>
  <span class="brand"><span class="mark"></span>메뉴 최종검수</span>
  <input id="search" placeholder="가게명 · item · 메뉴 검색" />
  <div class="nav">
    <button id="prev" class="ib" title="이전 (←)">◀</button>
    <span id="idx" class="idx">– / –</span>
    <button id="next" class="ib" title="다음 (→)">▶</button>
  </div>
  <select id="jump" title="가게로 이동"></select>
  <span id="meta-gen" class="gen sp"></span>
</header>

<main>
  <section id="left">
    <div id="infobar">
      <span id="store" class="store">—</span>
      <span class="kv">PlaceID <b id="placeid">—</b></span>
      <span class="kv">ItemID <b id="itemid">—</b></span>
      <span id="rev" class="rev"></span>
      <span class="zoom">
        <button id="zo" class="ib" title="축소">−</button>
        <button id="zf" class="ib wide" title="맞춤">맞춤</button>
        <button id="zi" class="ib" title="확대">+</button>
        <a id="orig" href="#" target="_blank" rel="noopener" title="원본 새 탭">↗</a>
      </span>
    </div>
    <div id="imgwrap"><img id="img" alt="이미지를 불러오는 중…" /></div>
  </section>

  <aside id="right">
    <table id="menu"><thead><tr><th>메뉴명</th><th>가격</th></tr></thead><tbody></tbody></table>
  </aside>
</main>
<script src="./app.js"></script>
</body>
</html>
