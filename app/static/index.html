<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu Finder — 메뉴 조립</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <strong>Menu Finder</strong>
    <span id="progress">—</span>
    <button id="export-all">전체 .xlsx 내보내기</button>
  </header>
  <div id="drop" class="drop">
    📁 itemid별 번역본 <b>폴더를 여기로 드래그</b>하거나 클릭해 선택하세요
    <div class="drop-sub">파일명 <code>place_(placeid)_image_(itemid)_…</code> · 상위폴더 <code>placeid_가게명</code>에서 자동 인식</div>
    <input id="folder" type="file" webkitdirectory directory multiple hidden />
    <details class="path-alt">
      <summary>또는 서버 경로로 가져오기</summary>
      <input id="trans-path" type="text" placeholder="예: G:\공유 드라이브\Place TR\Place\Translation" />
      <button id="import">경로에서 가져오기</button>
    </details>
  </div>
  <main>
    <aside id="sidebar"></aside>
    <section id="viewer">
      <div class="img-toolbar">
        <button id="zoom-out">−</button><button id="zoom-in">+</button>
        <button id="zoom-reset">맞춤</button>
        <a id="open-orig" href="#" target="_blank" rel="noopener">원본 새 탭</a>
      </div>
      <div id="img-wrap"><img id="img" alt="이미지를 선택하세요" /></div>
    </section>
    <section id="editor">
      <div class="head">
        <span id="meta-info" class="meta"></span>
        <label>가게명 <input id="title" type="text" /></label>
      </div>
      <table id="rows">
        <thead><tr>
          <th></th><th>메뉴명</th><th>가격</th><th>영어</th><th>일본어</th>
          <th>중국어<br>간체</th><th>중국어<br>번체</th>
        </tr></thead>
        <tbody></tbody>
      </table>
      <div class="actions">
        <button id="add-row">+ 행 추가</button>
        <button id="mark-done">검수완료 토글</button>
        <button id="save">저장</button>
      </div>
      <div class="prices">
        <div class="prices-title">가격 조각 (행 선택 후 클릭하면 가격 채움)</div>
        <div id="price-palette"></div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
