<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu Finder — 메뉴 조립</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Menu&nbsp;Finder</span>
      <span class="brand-sub">메뉴 조립 · 번역 검수</span>
    </div>
    <div class="header-right">
      <span id="progress" class="progress-pill">—</span>
      <button id="export-all" class="btn btn-primary">전체 .xlsx 내보내기</button>
    </div>
  </header>

  <div id="drop" class="drop">
    <div class="drop-inner">
      <span class="drop-icon" aria-hidden="true">⤓</span>
      <div class="drop-text">
        <b>itemid별 번역본 폴더</b>를 여기에 드래그 · 또는 클릭해 선택
        <div class="drop-sub">파일명 <code>place_(placeid)_image_(itemid)_…</code> &nbsp;·&nbsp; 상위폴더 <code>placeid_가게명</code> 에서 자동 인식 &nbsp;·&nbsp; Drive <code>.zip</code> 그대로 가능</div>
      </div>
    </div>
    <input id="folder" type="file" webkitdirectory directory multiple hidden />
    <details class="path-alt">
      <summary>또는 서버 경로로 가져오기</summary>
      <div class="path-row">
        <input id="trans-path" type="text" placeholder="예: G:\공유 드라이브\Place TR\Place\Translation" />
        <button id="import" class="btn btn-ghost">경로에서 가져오기</button>
      </div>
    </details>
  </div>

  <main>
    <aside id="sidebar"></aside>

    <section id="viewer">
      <div class="img-toolbar">
        <div class="zoom-group">
          <button id="zoom-out" class="icon-btn" title="축소">−</button>
          <button id="zoom-reset" class="btn btn-ghost btn-sm">맞춤</button>
          <button id="zoom-in" class="icon-btn" title="확대">+</button>
        </div>
        <a id="open-orig" class="link-out" href="#" target="_blank" rel="noopener">원본 새 탭 ↗</a>
      </div>
      <div id="img-wrap"><img id="img" alt="왼쪽에서 이미지를 선택하세요" /></div>
    </section>

    <section id="editor">
      <div class="head">
        <span id="meta-info" class="meta"></span>
        <label class="tr-toggle" title="번역 4종은 기본적으로 수정 불가. 조각 머지 등 꼭 필요할 때만 켜세요.">
          <input id="tr-edit" type="checkbox" /> 번역 수정
        </label>
        <label class="title-field">가게명
          <input id="title" type="text" placeholder="가게명" />
        </label>
      </div>
      <div id="city-fix" class="city-fix" hidden></div>
      <div class="table-wrap">
        <table id="rows">
          <thead><tr>
            <th></th><th>메뉴명</th><th>가격</th><th>영어</th><th>일본어</th>
            <th>중국어<br>간체</th><th>중국어<br>번체</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="actions">
        <button id="add-row" class="btn btn-ghost">＋ 행 추가</button>
        <button id="mark-done" class="btn btn-outline">검수완료 토글</button>
        <button id="save" class="btn btn-primary">저장</button>
      </div>
      <div class="prices">
        <div class="prices-title">가격 조각 <span class="hint">행 선택 후 클릭하면 가격 채움</span></div>
        <div id="price-palette"></div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
